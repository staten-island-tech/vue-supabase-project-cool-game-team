#this is an automation, which is needed bc supabase keeps pausing after a few days of inactivity
name: Keep Supabase Alive
on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # runs every Sunday at midnight

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          curl -X GET '${{ secrets.SUPABASE_URL }}/rest/v1/' \
          -H 'apikey: ${{ secrets.SUPABASE_PUBLISHABLE_KEY }}'